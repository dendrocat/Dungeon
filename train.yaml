behaviors:
  Enemy:
    trainer_type: poca 
    hyperparameters:
      learning_rate: 0.001
      learning_rate_schedule: linear 
      batch_size: 256
      buffer_size: 10240 
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 256 
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        strength: 1
        gamma: 0.99
    max_steps: 600000
    time_horizon: 64
    summary_freq: 2000
    checkpoint_interval: 50000
  PlayerAgent:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 0.001
      learning_rate_schedule: linear
      batch_size: 1024
      buffer_size: 10240
      beta: 0.01
      epsilon: 0.3
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        strength: 1
        gamma: 0.99
    max_steps: 2800000
    time_horizon: 1000
    summary_freq: 10000
    checkpoint_interval: 100000

checkpoint_settings:
  run_id: FSMAgent1VectorLightCondition2 
  initialize_from: null
  load_model: false
  resume: true
  force: false
  inference: false
  results_dir: results

env_settings:
  env_path: C:\Users\User\Unity\Builds\DiplomMLLight\The_Rift.exe
  env_args: null
  base_port: 5005
  num_envs: 10
  timeout_wait: 60
  seed: -1
  max_lifetime_restarts: 10
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60

engine_settings:
  time_scale: 40
  no_graphics: true

torch_settings:
  device: cuda
